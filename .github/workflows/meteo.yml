name: Meteo Bot

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests matplotlib
      - run: python meteo_bot.py
