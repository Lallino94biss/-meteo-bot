name: Meteo Bot

on:
  schedule:
    - cron: '0 6 * * *'   # 08:00 ora italiana
    - cron: '0 10 * * *'  # 12:00 ora italiana
  workflow_dispatch:       # consente avvio manuale per test

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python meteo_bot.py
