name: Notizie Bot

on:
  schedule:
    - cron: '0 4 * * *'   # 08:00 ora italiana
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python notizie_bot.py
